parameters:
  - name: targetEnvironment
    displayName: 'Select Target Deployment Environment'
    type: string
    default: 'Dev'
    allowedValues:
      - Dev
      - Staging
      - Production

trigger:
  - main

variables:
  - name: dockerRegistryServiceConnection
    value: 'DockerHubConnection'
  - name: imageTag
    value: '$(Build.BuildId)'
  
  # Matrix configuration variables mapped directly from the UI dropdown choice
  - ${{ if eq(parameters.targetEnvironment, 'Dev') }}:
    - name: currentK8sConnection
      value: 'K8s-Dev-Cluster-Connection'
    - name: currentManifestDir
      value: 'k8s/base'
  - ${{ if eq(parameters.targetEnvironment, 'Staging') }}:
    - name: currentK8sConnection
      value: 'K8s-Staging-Cluster-Connection'
    - name: currentManifestDir
      value: 'k8s/base'
  - ${{ if eq(parameters.targetEnvironment, 'Production') }}:
    - name: currentK8sConnection
      value: 'K8s-Prod-Cluster-Connection'
    - name: currentManifestDir
      value: 'k8s/base'

stages:
- stage: BuildAndPush
  displayName: Build & Push to DockerHub
  jobs:
  - job: BuildJob
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Docker@2
      displayName: Build and Push Angular Frontend
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: 'yourhubusername/frontend-angular'
        command: 'buildAndPush'
        Dockerfile: 'frontend/Dockerfile'
        tags: '$(imageTag)'

    - task: Docker@2
      displayName: Build and Push .NET Backend
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: 'yourhubusername/backend-dotnet'
        command: 'buildAndPush'
        Dockerfile: 'backend/Dockerfile'
        tags: '$(imageTag)'

    - task: Docker@2
      displayName: Build and Push Node.js Worker
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: 'yourhubusername/worker-node'
        command: 'buildAndPush'
        Dockerfile: 'worker/Dockerfile'
        tags: '$(imageTag)'

- stage: SelectedEnvironmentDeployment
  displayName: 'Deploying Selected Target Environment'
  dependsOn: BuildAndPush
  jobs:
  - template: templates/deploy-template.yml # Calls the same reusable template file
    parameters:
      environmentName: '${{ parameters.targetEnvironment }}' 
      k8sServiceConnection: '$(currentK8sConnection)'        
      manifestDirectory: '$(currentManifestDir)'              
      imageTag: '$(imageTag)'
